name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Configure base path for GitHub Pages
        run: |
          if grep -q '^base:' docs/content/_data/site.yaml; then
            sed -i 's|^base:.*|base: /agl-bluetooth-integration-gsoc26/|' docs/content/_data/site.yaml
          else
            printf '\nbase: /agl-bluetooth-integration-gsoc26/\n' >> docs/content/_data/site.yaml
          fi
        shell: bash

      - name: Install Dependencies
        run: dart pub get
        working-directory: docs

      - name: Install Jaspr CLI
        run: dart pub global activate jaspr_cli

      - name: Build Static Site
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          jaspr build
        working-directory: docs

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/jaspr

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
